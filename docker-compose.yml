version: "3.8"

services:
  # ─── PostgreSQL Database ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aarogya
      POSTGRES_PASSWORD: aarogya_secret
      POSTGRES_DB: aarogya_whatsai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aarogya"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis (for BullMQ job queue) ─────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Next.js App ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aarogya:aarogya_secret@postgres:5432/aarogya_whatsai?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ─── Background Worker (BullMQ) ──────────────────────────
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: ["node", "-e", "require('./src/lib/queue/worker.ts')"]
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://aarogya:aarogya_secret@postgres:5432/aarogya_whatsai?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
